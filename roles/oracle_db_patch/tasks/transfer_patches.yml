---
- name: Ensure patch base directory exists
  file:
    path: "{{ patch_base_dir }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0755'

- name: Ensure DBRU directory exists
  file:
    path: "{{ dbru_dir }}"
    state: directory
    owner: "{{ oracle_user }}"
    group: "{{ oracle_group }}"
    mode: '0755'

